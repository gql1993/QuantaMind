services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      QUANTAMIND_GATEWAY_HOST: 0.0.0.0
      QUANTAMIND_GATEWAY_PORT: 18789
    ports:
      - "18789:18789"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18789/api/v1/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
