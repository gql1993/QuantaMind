<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QuantaMind 客户端</title>
  <style>
    :root { --bg: #0f1419; --surface: #1a2332; --text: #e6edf3; --accent: #58a6ff; --muted: #8b949e; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }
    .container { max-width: 720px; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; height: 100vh; }
    h1 { font-size: 1.25rem; color: var(--accent); margin: 0 0 16px 0; }
    .chat { flex: 1; overflow-y: auto; padding: 16px 0; }
    .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; max-width: 85%; }
    .msg.user { background: var(--accent); color: #fff; margin-left: auto; }
    .msg.assistant { background: var(--surface); color: var(--text); }
    .msg .role { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
    .input-row { display: flex; gap: 8px; padding: 16px 0; border-top: 1px solid var(--surface); }
    #input { flex: 1; padding: 10px 14px; border: 1px solid var(--surface); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 1rem; }
    #input:focus { outline: none; border-color: var(--accent); }
    #send { padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    #send:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>QuantaMind · 量子科研 AI 中台</h1>
    <div class="chat" id="chat"></div>
    <div class="input-row">
      <input type="text" id="input" placeholder="输入消息，与 AI 科学家对话..." autocomplete="off" />
      <button id="send">发送</button>
    </div>
    <div class="status" id="status">正在连接…</div>
  </div>
  <script>
    const GATEWAY = (typeof window.electronAPI !== 'undefined' && window.electronAPI.gatewayUrl) ? window.electronAPI.gatewayUrl : 'http://127.0.0.1:18789';
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');

    let sessionId = null;

    function addMsg(role, content) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = '<div class="role">' + (role === 'user' ? 'You' : 'QuantaMind') + '</div><div class="content"></div>';
      div.querySelector('.content').textContent = content;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    async function ensureSession() {
      if (sessionId) return sessionId;
      const r = await fetch(GATEWAY + '/api/v1/sessions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      if (!r.ok) throw new Error('Session failed');
      const d = await r.json();
      sessionId = d.session_id;
      return sessionId;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      addMsg('user', text);
      sendBtn.disabled = true;
      statusEl.textContent = '正在回复...';

      try {
        await ensureSession();
        const res = await fetch(GATEWAY + '/api/v1/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, message: text, stream: true })
        });
        if (!res.ok) throw new Error(res.statusText);
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        const assistantDiv = addMsg('assistant', '');
        const contentEl = assistantDiv.querySelector('.content');
        let buf = '';
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop() || '';
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const obj = JSON.parse(line.slice(6));
                if (obj.type === 'content' && obj.data) contentEl.textContent += obj.data;
              } catch (_) {}
            }
          }
          chatEl.scrollTop = chatEl.scrollHeight;
        }
        statusEl.textContent = '已连接 · ' + (sessionId || '').slice(0, 8) + '...';
      } catch (e) {
        statusEl.textContent = '错误: ' + e.message;
        addMsg('assistant', '连接失败，请确认已启动 QuantaMind 服务端（python run_gateway.py）');
      }
      sendBtn.disabled = false;
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

    // 启动时检测连接
    (async function init() {
      try {
        const r = await fetch(GATEWAY + '/health');
        if (r.ok) {
          const ok = await ensureSession();
          if (ok) {
            statusEl.textContent = '已连接，可以开始对话';
            addMsg('assistant', '已就绪。输入消息与 AI 科学家对话。');
          }
        } else statusEl.textContent = '未连接，请先启动服务端（端口 18789）';
      } catch (_) {
        statusEl.textContent = '未连接。请先启动 QuantaMind 服务端：python run_gateway.py';
      }
    })();
  </script>
</body>
</html>
